[[target.executable]]
name = "eval_point_mismatch_mask_and_actual"
function = "eval_runner::eval_point_mismatch_mask_and_actual"

[[target.executable]]
name = "eval_point_mismatch_detail"
function = "eval_runner::eval_point_mismatch_detail"

[[target.executable]]
name = "eval_point_planet_debug_frame"
function = "eval_runner::eval_point_planet_debug_frame"

[[target.executable]]
name = "eval_frame_from_eqj"
function = "eval_runner::eval_frame_from_eqj"
